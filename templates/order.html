<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Order</title>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            padding-top: 60px;
        }
        .order-box {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .page-title {
            color: #4a4a4a;
            font-weight: 400;
            font-size: 24px;
        }
        .table th {
            font-weight: 600;
            color: #333;
            background-color: #fcfcfc;
            border-bottom: 2px solid #dee2e6;
        }
        .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="order-box">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
    <h2 class="page-title">New Order</h2>
    <div>
        <a href="http://127.0.0.1:5000/" class="btn btn-secondary btn-sm px-3 me-2">← Home</a>
        <input type="text" id="customerName" class="form-control w-25 d-inline" placeholder="Customer Name">
    </div>
</div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Product</th>
                            <th style="width: 20%;">Price</th>
                            <th style="width: 15%;">Quantity</th>
                            <th style="width: 15%;">Total</th>
                            <th style="width: 15%;">
                                <button class="btn btn-primary btn-sm px-3" id="addMoreBtn">Add More</button>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="order-rows"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Total</td>
                            <td><input type="text" id="grandTotal" class="form-control" readonly value="0"></td>
                            <td><button class="btn btn-success btn-sm px-3" id="saveOrder">Save</button></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

<script>
    var products = [];

    $.get('http://127.0.0.1:5000/get_products', function(response) {
        products = response;
        addRow();
    }, 'json');

    function getProductOptions() {
        var options = '<option value="">-- Select Product --</option>';
        products.forEach(function(p) {
            options += '<option value="' + p.product_id + '" data-price="' + p.price_per_unit + '">' + p.name + '</option>';
        });
        return options;
    }

    function addRow() {
        var row = '<tr>' +
            '<td><select class="form-control product-select">' + getProductOptions() + '</select></td>' +
            '<td><input type="number" class="form-control price-input" readonly></td>' +
            '<td><input type="number" class="form-control quantity-input" value="1" min="1"></td>' +
            '<td><input type="number" class="form-control total-input" readonly></td>' +
            '<td><button class="btn btn-danger btn-sm remove-row">Remove</button></td>' +
            '</tr>';
        $('#order-rows').append(row);
    }

    $('#addMoreBtn').on('click', function() { addRow(); });

    $(document).on('click', '.remove-row', function() {
        $(this).closest('tr').remove();
        updateGrandTotal();
    });

    $(document).on('change', '.product-select', function() {
        var price = $(this).find(':selected').data('price');
        var row = $(this).closest('tr');
        row.find('.price-input').val(price);
        var qty = row.find('.quantity-input').val();
        row.find('.total-input').val((price * qty).toFixed(2));
        updateGrandTotal();
    });

    $(document).on('input', '.quantity-input', function() {
        var row = $(this).closest('tr');
        var price = row.find('.price-input').val();
        var qty = $(this).val();
        row.find('.total-input').val((price * qty).toFixed(2));
        updateGrandTotal();
    });

    function updateGrandTotal() {
        var grand = 0;
        $('.total-input').each(function() {
            grand += parseFloat($(this).val()) || 0;
        });
        $('#grandTotal').val(grand.toFixed(2));
    }

    $('#saveOrder').on('click', function() {
        var customerName = $('#customerName').val();
        if (!customerName) { alert('Please enter customer name!'); return; }
        var orderDetails = [];
        var valid = true;
        $('#order-rows tr').each(function() {
            var productId = $(this).find('.product-select').val();
            var quantity = $(this).find('.quantity-input').val();
            var totalPrice = $(this).find('.total-input').val();
            if (!productId) { alert('Please select a product!'); valid = false; return false; }
            orderDetails.push({ product_id: productId, quantity: quantity, total_price: totalPrice });
        });
        if (!valid) return;
        $.ajax({
            url: 'http://127.0.0.1:5000/insert_order',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ customer_name: customerName, total: $('#grandTotal').val(), order_details: orderDetails }),
            success: function(response) {
                alert('Order saved successfully!');
                window.location.href = 'http://127.0.0.1:5000/';
            },
            error: function() { alert('Error saving order!'); }
        });
    });
</script>
</body>
</html>
