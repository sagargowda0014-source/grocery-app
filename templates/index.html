<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Store</title>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            padding-top: 60px;
        }
        .main-box {
            background-color: rgba(255,255,255,0.95);
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .page-title { color: #4a4a4a; font-weight: 400; font-size: 24px; }
        .table th { font-weight: 600; color: #333; background-color: #fcfcfc; border-bottom: 2px solid #dee2e6; }
        .table td { vertical-align: middle; }
    </style>
</head><body>
    <div class="container">
        <div class="main-box">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h2 class="page-title">Grocery Store Management System</h2>
                <div>
                    <a href="/manage_products" class="btn btn-primary btn-sm px-3 me-2">Manage Products</a>
                    <a href="/order" class="btn btn-primary btn-sm px-3">New Order</a>
                </div>
            </div>
            <input type="text" id="searchBox" class="form-control mb-3" placeholder="Search by customer name...">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Order Number</th>
                            <th>Customer Name</th>
                            <th>Total Cost</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    $.get('http://127.0.0.1:5000/get_orders', function(response) {
        var tbody = $('#orders-list');
        tbody.empty();
        response.forEach(function(order, index) {
            var row = '<tr>' +
                '<td>' + order.datetime + '</td>' +
                '<td>' + (index + 1) + '</td>' +
                '<td><a href="#" class="view-details" data-id="' + order.order_id + '">' + order.customer_id + '</a></td>' +
'<td>₹' + order.total + '</td>' +
'<td><button class="btn btn-danger btn-sm btn-delete-order" data-id="' + order.order_id + '">Delete</button></td>' +
'</tr>';

            tbody.append(row);
        });
    }, 'json');


$(document).on('click', '.view-details', function(e) {
    e.preventDefault();
    var orderId = $(this).data('id');
    var customerName = $(this).text();
    $.get('http://127.0.0.1:5000/get_order_details/' + orderId, function(response) {
        var tbody = $('#order-detail-list');
        tbody.empty();
        response.forEach(function(item) {
            tbody.append('<tr><td>' + item.name + '</td><td>' + item.quantity + '</td><td>₹' + item.total_price + '</td></tr>');
        });
        $('#modalTitle').text('Order by: ' + customerName);
        $('#orderModal').show();
    });
});
// Delete order
$(document).on('click', '.btn-delete-order', function() {
    if (confirm('Delete this order?')) {
        var orderId = $(this).data('id');
        $.ajax({
            url: 'http://127.0.0.1:5000/delete_order',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({order_id: orderId}),
            success: function() {
                location.reload();
            }
        });
    }
});

// Search
$('#searchBox').on('keyup', function() {
    var search = $(this).val().toLowerCase();
    $('#orders-list tr').filter(function() {
        $(this).toggle($(this).text().toLowerCase().indexOf(search) > -1);
    });
});
</script>

<div id="orderModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:white; width:500px; margin:100px auto; padding:30px; border-radius:8px;">
        <h4 id="modalTitle">Order Details</h4>
        <table class="table">
            <thead><tr><th>Product</th><th>Quantity</th><th>Total</th></tr></thead>
            <tbody id="order-detail-list"></tbody>
        </table>
        <button onclick="document.getElementById('orderModal').style.display='none'" class="btn btn-secondary">Close</button>
    </div>
</div>
</body>
</html>
