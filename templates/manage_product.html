<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" >
    <meta charset="UTF-8">
    <meta name="viewport">
    content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>



    <style>
        /* 2. Custom Styling */
        body {
            /* Full-screen blurred grocery background */
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1974&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            padding-top: 60px; /* Pushes the white box down slightly */
        }

        /* The white card container matching the image */
        .manage-box {
            background-color: rgba(255, 255, 255, 0.95); /* Semi-transparent white */
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto; /* Centers the box horizontally */
        }

        /* Styling the header text */
        .page-title {
            color: #4a4a4a;
            font-weight: 400;
            font-size: 24px;
        }

        /* Adjusting table borders and header color to match perfectly */
        .table th {
            font-weight: 600;
            color: #333;
            background-color: #fcfcfc;
            border-bottom: 2px solid #dee2e6;
        }

        .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="manage-box">

           <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
    <h2 class="page-title">Manage Products</h2>
    <div>
        <a href="http://127.0.0.1:5000/" class="btn btn-secondary btn-sm px-3 me-2">← Home</a>
        <button class="btn btn-primary btn-sm px-3" data-bs-toggle="modal" data-bs-target="#addProductModal">Add New Product</button>
    </div>
</div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Name</th>
                            <th style="width: 20%;">Unit</th>
                            <th style="width: 25%;">Price Per Unit</th>
                            <th style="width: 20%;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="product-list">
                    </tbody>
                </table>
            </div>

        </div>
    </div>
<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add New Product</h5>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label>Name</label>
          <input type="text" id="productName" class="form-control" placeholder="Name">
        </div>
        <div class="mb-3">
          <label>Unit</label>
          <select id="productUnit" class="form-control">
            <option value="1">each</option>
            <option value="2">kg -</option>
          </select>
        </div>
        <div class="mb-3">
          <label>Price Per Unit</label>
          <input type="number" id="productPrice" class="form-control" placeholder="Price Per Unit">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary" id="saveProduct">Save</button>
      </div>
    </div>
  </div>
</div>

<script>

        var productListUrl = "http://127.0.0.1:5000/get_products";
        $(document).ready(function() {
            $.get(productListUrl, function (response) {
                if (response) {
                    var tableBody = $('#product-list');
                    tableBody.empty();
                    response.forEach(function (product) {
                        var row = '<tr>' +
                            '<td>' + product.name + '</td>' +
                            '<td>' + product.unit_name + '</td>' +
                            '<td>₹' + product.price_per_unit  + '</td>' +
                            '<td>' +
'<button class="btn btn-warning btn-sm me-1 btn-edit" data-id="' + product.product_id + '" data-name="' + product.name + '" data-price="' + product.price_per_unit + '">Edit</button>' +
'<button class="btn btn-danger btn-sm btn-delete" data-id="' + product.product_id + '">Delete</button>' +
'</td>' +
'</tr>';

                        tableBody.append(row);
                    });
                }
            }, 'json');

$('#saveProduct').on('click', function() {
            $.ajax({
                url: 'http://127.0.0.1:5000/insert_product',
                type: 'POST',
                data: {
                    product_name: $('#productName').val(),
                    uom_id: $('#productUnit').val(),
                    price_per_unit: $('#productPrice').val()
                },
                success: function(response) {
                    $('#addProductModal').modal('hide');
                    location.reload();
                }
            });
        });
        $(document).on('click', '.btn-delete', function() {
            var productId = $(this).data('id');
            $.ajax({
                url: '/delete_products',
                type: 'POST',
                data: { product_id: productId },
                success: function(response) {
                    location.reload();
                }
            });
        });


    });
    </script>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:white; width:400px; margin:150px auto; padding:30px; border-radius:8px;">
        <h4>Edit Product</h4>
        <input type="hidden" id="edit-product-id">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" id="edit-name" class="form-control">
        </div>
        <div class="mb-3">
            <label>Price</label>
            <input type="number" id="edit-price" class="form-control">
        </div>
        <button onclick="saveEdit()" class="btn btn-success">Save</button>
        <button onclick="document.getElementById('editModal').style.display='none'" class="btn btn-secondary ms-2">Cancel</button>
    </div>
</div>

<script>
$(document).on('click', '.btn-edit', function() {
    $('#edit-product-id').val($(this).data('id'));
    $('#edit-name').val($(this).data('name'));
    $('#edit-price').val($(this).data('price'));
    $('#editModal').show();
});

function saveEdit() {
    $.ajax({
        url: 'http://127.0.0.1:5000/update_product',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            product_id: $('#edit-product-id').val(),
            name: $('#edit-name').val(),
            price_per_unit: $('#edit-price').val(),
            uom_id: 1
        }),
        success: function() {
            $('#editModal').hide();
            alert('Updated!');
            location.reload();
        }
    });
}
</script>
</body>
</html>
